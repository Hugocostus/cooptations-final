<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Association Login - Portal</title>
    <style>
        /* --- RED, BLACK & WHITE DESIGN SYSTEM --- */
        :root {
            --bg-body-outer: #f4f4f4; /* Gris clair extérieur */
            --bg-deep-red: #b91c1c;   /* Rouge intense */
            --bg-card: #000000;       /* Noir pur */
            --accent-white: #ffffff;  /* Blanc */
            --border: #ffffff;        /* Bordures blanches */
            
            /* Arrondis */
            --radius-main: 20px;
            --radius-card: 15px;
            --radius-btn: 8px;
        }

        body {
            background-color: var(--bg-body-outer);
            color: var(--accent-white);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- CONTENEUR PRINCIPAL CENTRÉ --- */
        .main-wrapper {
            background-color: var(--bg-deep-red);
            max-width: 500px; /* Format compact pour le login */
            width: 95%;
            margin: 60px auto;
            border-radius: var(--radius-main);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0));
            border-bottom: 2px solid var(--border);
        }

        header h1 { 
            color: var(--accent-white); 
            font-size: 1.8rem; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 900;
        }

        main {
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* --- CARTE DE LOGIN --- */
        .login-container {
            background: var(--bg-card);
            width: 100%;
            padding: 35px;
            border-radius: var(--radius-card);
            border: 3px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            color: var(--accent-white);
            font-size: 1.4rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* --- GROUPES D'INPUTS --- */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background-color: #1a1a1a;
            border: 1px solid var(--border);
            color: var(--accent-white);
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
            margin-top: 5px;
        }

        input:focus {
            border-color: #cccccc;
        }

        input::placeholder {
            color: #777777;
        }

        /* --- BOUTON DE CONNEXION BLANC --- */
        #login-btn {
            width: 100%;
            background-color: var(--accent-white);
            color: var(--bg-card);
            border: none;
            padding: 15px;
            border-radius: var(--radius-btn);
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #login-btn:hover {
            background-color: #dddddd;
            transform: translateY(-2px);
        }

        #login-status {
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 1.2em;
            color: #ff9999;
            font-weight: bold;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: var(--accent-white);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 30px 20px;
            background-color: var(--bg-card);
            border-top: 2px solid var(--border);
            color: var(--accent-white);
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .main-wrapper { margin: 20px auto; }
            .login-container { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <h1>Association Access</h1>
        </header>

        <main>
            <div class="login-container">
                <h2>Log In</h2>

                <div class="input-group">
                    <input type="email" id="email" placeholder="Email address" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="numero" placeholder="Password" required>
                </div>

                <div class="input-group">
                    <input type="text" id="asso" placeholder="Association name" required>
                </div>

                <button id="login-btn">Log In</button>

                <p id="login-status"></p>

                <a href="index.html" class="back-link">← Back to main portal</a>
            </div>
        </main>

        <footer>
            <p>© <span id="year"></span> — emlyon Students Corporation Council</p>
        </footer>
    </div>

    <script src="login-asso.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
