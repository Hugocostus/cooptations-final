<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishes Portal - Associations</title>
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --blue-electric: #2f81f7;
            --blue-soft: #58a6ff;
            --text-main: #c9d1d9;
            --text-bright: #ffffff;
            --border: #30363d;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to bottom, #161b22, #0d1117);
        }

        header h1 { color: var(--blue-electric); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1.8rem; }

        main { flex: 1; max-width: 800px; margin: 40px auto; width: 90%; display: flex; flex-direction: column; gap: 30px; }

        section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 1.1rem;
            color: var(--blue-soft);
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 4px solid var(--blue-electric);
            padding-left: 15px;
        }

        .selection-etudiant p {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-bright);
            background: rgba(47, 129, 247, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--blue-electric);
            margin: 0;
        }

        .voeu { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; gap: 20px; }
        .voeu label { font-weight: bold; flex: 0 0 100px; }

        select {
            flex: 1;
            background-color: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 6px;
            outline: none;
        }

        #export-csv {
            width: 100%;
            background-color: var(--blue-electric);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        footer { text-align: center; padding: 30px 20px; background-color: #161b22; border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
    
    <script>
        // SÉCURITÉ DOUBLE : Statut du portail + Connexion de l'élève
        async function securityCheck() {
            try {
                const response = await fetch('status.txt');
                const text = await response.text();
                // On cherche spécifiquement la ligne pour les voeux
                const ouvert = text.toLowerCase().includes('voeux : open');

                if (!ouvert) {
                    alert("🚫 La saisie des vœux est actuellement fermée.");
                    window.location.href = "index.html";
                    return;
                }

                // Si c'est ouvert, on vérifie quand même que l'élève s'est loggé
                if (localStorage.getItem("logged") !== "yes") {
                    window.location.href = "login.html";
                }
            } catch (e) {
                window.location.href = "index.html";
            }
        }
        securityCheck();
    </script>
</head>
<body>
    <header>
        <h1>Wishes Center</h1>
    </header>

    <main>
        <section class="selection-etudiant">
            <h2>Student Session</h2>
            <p id="etudiant-selectionne1">Loading data...</p>
            <p id="etudiant-selectionne2" style="display:none;"></p>
        </section>

        <section class="voeux-section">
            <h2>Your 5 Choices of Association</h2>
            <div class="voeu"><label for="voeu1">Choice 1</label><select id="voeu1"></select></div>
            <div class="voeu"><label for="voeu2">Choice 2</label><select id="voeu2"></select></div>
            <div class="voeu"><label for="voeu3">Choice 3</label><select id="voeu3"></select></div>
            <div class="voeu"><label for="voeu4">Choice 4</label><select id="voeu4"></select></div>
            <div class="voeu"><label for="voeu5">Choice 5</label><select id="voeu5"></select></div>
            <button id="export-csv">Register my choices</button>
            <p id="status-msg"></p>
        </section>
    </main>

    <footer>
        <p>© <span id="year"></span> — Em-lyon Students Corporation Council</p>
    </footer>

    <script src="script etudiant.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>

</html>
