<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Associations Portal</title>
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --blue-electric: #2f81f7;
            --blue-soft: #58a6ff;
            --text-main: #c9d1d9;
            --text-bright: #ffffff;
            --border: #30363d;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #161b22, #0d1117);
            border-bottom: 1px solid var(--border);
        }

        header h1 { color: var(--blue-electric); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1.8rem; }

        main { flex: 1; max-width: 500px; margin: 40px auto; width: 90%; }

        section.formulaire-etudiant {
            background: var(--bg-card);
            padding: 35px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        h2 { font-size: 1.2rem; color: var(--blue-soft); margin: 0 0 25px 0; text-align: center; text-transform: uppercase; }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }

        input {
            background-color: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text-bright);
            padding: 12px 15px;
            border-radius: 6px;
            outline: none;
        }

        #export-csv {
            width: 100%;
            background-color: var(--blue-electric);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #status-msg { margin-top: 20px; text-align: center; min-height: 1.2em; }

        footer { text-align: center; padding: 30px 20px; background-color: #161b22; border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
    
    <script>
        // SÉCURITÉ : Vérification immédiate du statut au chargement
        async function verifierAcces() {
            try {
                const response = await fetch('status.txt');
                const text = await response.text();
                // On vérifie si la ligne inscription contient bien OPEN
                const estOuvert = text.toLowerCase().includes('inscription : open');

                if (!estOuvert) {
                    alert("🚫 Les inscriptions sont actuellement fermées.");
                    window.location.href = "index.html";
                }
            } catch (e) {
                console.error("Erreur de vérification", e);
                window.location.href = "index.html";
            }
        }
        verifierAcces();
    </script>
</head>
<body>
    <header>
        <h1>Associations Portal</h1>
    </header>

    <main>
        <section class="formulaire-etudiant">
            <h2>New Registration</h2>
            <form id="form-etudiant">
                <div class="form-group">
                    <label for="prenom">First Name</label>
                    <input type="text" id="prenom" name="prenom" required placeholder="e.g.: John">
                </div>
                <div class="form-group">
                    <label for="nom">Last Name</label>
                    <input type="text" id="nom" name="nom" required placeholder="e.g.: Doe">
                </div>
                <div class="form-group">
                    <label for="numero">Student ID</label>
                    <input type="text" id="numero" name="numero" required placeholder="e.g.: 22104567">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="example@school.com">
                </div>
                <button type="button" id="export-csv">Sign Up</button>
            </form>
            <p id="status-msg"></p>
            <div style="text-align:center; margin-top:20px;"><a href="index.html" style="color:var(--text-main); text-decoration:none; font-size:0.8rem;">← Back to Portal</a></div>
        </section>
    </main>

    <footer>
        <p>© <span id="year"></span> — emlyon Students Corporation Council</p>
    </footer>

    <script src="script inscription.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
