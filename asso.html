<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Associations Portal - emlyon</title>
    <style>
        /* --- RED, BLACK & WHITE DESIGN SYSTEM --- */
        :root {
            --bg-body-outer: #f4f4f4; 
            --bg-deep-red: #b91c1c;   
            --bg-card: #000000;       
            --accent-white: #ffffff;  
            --border: #ffffff;        
            --locked: #1a1a1a;        
            
            /* Arrondis */
            --radius-main: 20px;
            --radius-card: 15px;
            --radius-btn: 8px;
        }

        body {
            background-color: var(--bg-body-outer);
            color: var(--accent-white);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- CONTENEUR PRINCIPAL --- */
        .main-wrapper {
            background-color: var(--bg-deep-red);
            max-width: 1100px;
            width: 95%;
            margin: 40px auto;
            border-radius: var(--radius-main);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0));
            border-bottom: 2px solid var(--border);
        }

        header h1 { 
            color: var(--accent-white); 
            font-size: 2.2rem; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-weight: 900;
        }

        main {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            flex: 1;
        }

        /* --- CARTES NOIRES (Control Panel & Table) --- */
        .control-panel, .table-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius-card);
            border: 3px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .control-panel label {
            display: flex;
            flex-direction: column;
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--accent-white);
            gap: 8px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.3rem;
            color: var(--accent-white);
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 5px solid var(--accent-white);
            padding-left: 15px;
            font-weight: 800;
        }

        /* --- INPUTS --- */
        input {
            background-color: #1a1a1a;
            border: 1px solid var(--border);
            color: var(--accent-white);
            padding: 12px 14px;
            border-radius: 6px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus:not([readonly]) {
            border-color: #cccccc;
        }

        input[readonly] {
            background-color: var(--locked);
            color: #aaaaaa;
            cursor: not-allowed;
            border-style: dashed;
        }

        /* --- BOUTON BLANC --- */
        button#envoyer {
            background-color: var(--accent-white);
            color: var(--bg-card);
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius-btn);
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-left: auto;
            text-transform: uppercase;
        }

        button#envoyer:hover {
            background-color: #dddddd;
            transform: translateY(-2px);
        }

        /* --- TABLE STYLING --- */
        .table-container {
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-card);
        }

        th {
            background-color: #1a1a1a;
            color: var(--accent-white);
            text-align: left;
            padding: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 900;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #333;
        }

        .search-box { position: relative; }
        .search-box input { width: 100%; box-sizing: border-box; }
        
        [id^="resultats-"] {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: #111;
            border: 1px solid var(--border);
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 30px 20px;
            background-color: var(--bg-card);
            border-top: 2px solid var(--border);
            color: var(--accent-white);
            font-weight: bold;
        }

        footer a {
            color: var(--accent-white);
            text-decoration: underline;
            margin: 0 10px;
        }

        @media (max-width: 600px) {
            main { padding: 20px; }
            .control-panel { flex-direction: column; align-items: stretch; }
            button#envoyer { margin-left: 0; }
        }
    </style>
</head>

<body>

    <script>
        (async () => {
            if (sessionStorage.getItem("accesAsso") === "oui") {
                document.getElementById("main-portal").style.display = "block";
                return;
            }
            const saisie = prompt("Access code for this page:");
            if (!saisie) {
                window.location.href = "index.html";
                return;
            }
            const res = await fetch(
                "https://script.google.com/macros/s/AKfycbw17YxKO-2sZnEy5vDrgNvFeqRNqVozi1pz5lH3WLh_bsICjWNXREhRHvI7LyxZ7BZp/exec" 
                + "?action=checkCode&code=" + encodeURIComponent(saisie)
            );
            const txt = await res.text();
            if (txt.trim() === "OK") {
                sessionStorage.setItem("accesAsso", "oui");
                document.getElementById("main-portal").style.display = "block";
            } else {
                alert("Incorrect code ❌");
                window.location.href = "index.html";
            }
        })();
    </script>

    <div id="main-portal" class="main-wrapper" style="display:none">
        <header>
            <h1>Associations Portal</h1>
        </header>

        <main>
            <div class="control-panel">
                <label>Association Name
                    <input type="text" id="select-asso" readonly>
                </label>
                <label>Association Email
                    <input type="email" id="email-libre" readonly>
                </label>
                <label>Max Students
                    <input type="number" id="num-libre" placeholder="e.g.: 42">
                </label>
                <button id="envoyer">Submit List</button>
            </div>

            <section class="table-section">
                <h2>Students Table</h2>
                <div class="table-container">
                    <table id="table-etudiants">
                        <thead>
                            <tr>
                                <th style="width: 60px;">ID</th>
                                <th>Student Name</th>
                                <th>Search & Selection</th>
                            </tr>
                        </thead>
                        <tbody>
                            <script>
                                for (let i = 1; i <= 150; i++) {
                                    document.write(`
                                    <tr>
                                        <td style="color: #aaa; font-weight: bold;">#${i}</td>
                                        <td id="nom-${i}" style="color: var(--accent-white); font-weight: 600;">—</td>
                                        <td class="search-box">
                                            <input type="text" id="search-${i}" placeholder="Type name...">
                                            <div id="resultats-${i}"></div>
                                        </td>
                                    </tr>
                                    `);
                                }
                            </script>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>© <span id="year"></span> — emlyon Students Corporation Council</p>
            <p>
                <a href="faq.html">FAQ</a> | 
                <a href="rgpd.html">Data Policy</a>
            </p>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        window.addEventListener("DOMContentLoaded", () => {
            const asso = localStorage.getItem("userAsso");
            const email = localStorage.getItem("userEmail");
            if (asso) document.getElementById("select-asso").value = asso;
            if (email) document.getElementById("email-libre").value = email;
        });
    </script>
    <script src="script asso.js"></script>

</body>
</html>
